name: Secure CI

on:
  push:
    branches:
      - main
      - strelnikova_da_108_lab
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  tests:
    name: Run autotests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: StrelnikovaDA

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            StrelnikovaDA/backend/requirements.txt
            StrelnikovaDA/worker/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Install worker dependencies
        run: |
          pip install -r worker/requirements.txt

      - name: Run backend tests
        run: |
          cd backend
          python -m unittest -v test_backend.py

      - name: Run worker tests
        env:
          DB_PATH: /tmp/tasks.db
          SPELLCHECK_DELAY_SECONDS: "0"
        run: |
          cd worker
          python -m unittest -v test_spellchecker.py

  static-analysis:
    name: Static code analysis with Bandit
    runs-on: ubuntu-latest
    needs: tests

    defaults:
      run:
        working-directory: StrelnikovaDA

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: Run Bandit security scan
        run: |
          bandit -r backend worker \
            -x backend/test_backend.py,worker/test_spellchecker.py \
            -ll

  dependency-security:
    name: Dependency security audit
    runs-on: ubuntu-latest
    needs: tests

    defaults:
      run:
        working-directory: StrelnikovaDA

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Audit backend dependencies
        run: |
          pip-audit -r backend/requirements.txt

      - name: Audit worker dependencies
        run: |
          pip-audit -r worker/requirements.txt

  secret-scan:
    name: Secret scanning with Gitleaks
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
